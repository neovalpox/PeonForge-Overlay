<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
body { display: flex; align-items: flex-start; justify-content: flex-end; padding: 8px; cursor: pointer; -webkit-app-region: drag; }

/* ─── Warcraft III style notification ─── */
.wc3-notif {
  display: flex; align-items: center; gap: 0;
  animation: wc3In 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  filter: drop-shadow(0 4px 20px rgba(0,0,0,0.8));
}

@keyframes wc3In {
  from { opacity: 0; transform: translateX(100px) scale(0.8); }
  50% { transform: translateX(-6px) scale(1.02); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}
.closing .wc3-notif {
  animation: wc3Out 0.4s ease forwards;
}
@keyframes wc3Out {
  to { opacity: 0; transform: translateX(100px) scale(0.8); }
}

/* Portrait frame - Warcraft III gold border style */
.portrait-frame {
  position: relative;
  width: 82px; height: 82px;
  flex-shrink: 0;
  z-index: 2;
}
.portrait-frame img {
  width: 72px; height: 72px;
  display: block;
  border-radius: 4px;
  position: absolute;
  top: 5px; left: 5px;
}
/* Gold ornate border */
.portrait-frame::before {
  content: '';
  position: absolute; inset: 0;
  border: 3px solid #8b6914;
  border-radius: 6px;
  box-shadow:
    inset 0 0 4px rgba(255,215,0,0.4),
    0 0 8px rgba(139,105,20,0.6),
    inset 0 1px 0 rgba(255,255,255,0.15);
  background: linear-gradient(135deg, #c9a84c 0%, #8b6914 20%, #dfbd5e 40%, #8b6914 60%, #c9a84c 100%);
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  padding: 4px;
  z-index: 1;
}
/* Corner ornaments */
.portrait-frame::after {
  content: '';
  position: absolute; inset: -2px;
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 8px;
  pointer-events: none;
}

/* Glow pulse behind portrait */
.portrait-glow {
  position: absolute;
  inset: -8px;
  background: radial-gradient(circle, rgba(255,215,0,0.15) 0%, transparent 70%);
  animation: portraitGlow 2s ease infinite;
  border-radius: 50%;
  z-index: 0;
}
@keyframes portraitGlow {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* Message panel */
.msg-panel {
  background: linear-gradient(180deg, rgba(20,16,8,0.95) 0%, rgba(12,10,6,0.98) 100%);
  border: 2px solid #8b6914;
  border-left: none;
  border-radius: 0 8px 8px 0;
  padding: 12px 18px 12px 14px;
  margin-left: -4px;
  min-width: 260px;
  box-shadow:
    inset 0 1px 0 rgba(255,215,0,0.08),
    inset 0 -1px 0 rgba(0,0,0,0.3);
}

/* Gold decorative line at top of msg */
.msg-panel::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, #8b6914, #dfbd5e, #8b6914);
}

.msg-title {
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 13px;
  font-weight: 700;
  color: #dfbd5e;
  text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  margin-bottom: 4px;
}

.msg-text {
  font-family: 'Segoe UI', sans-serif;
  font-size: 12px;
  color: #c8b88a;
  line-height: 1.4;
  text-shadow: 0 1px 1px rgba(0,0,0,0.6);
}

.msg-project {
  color: #5aff5a;
  font-weight: 700;
  text-shadow: 0 0 6px rgba(90,255,90,0.3);
}

.msg-sub {
  font-size: 10px;
  color: #7a7055;
  margin-top: 6px;
  font-style: italic;
}

.msg-rewards {
  display: flex; gap: 12px; margin-top: 6px;
  font-family: 'Segoe UI', sans-serif;
  font-size: 11px;
}
.reward-gold { color: #ffd700; text-shadow: 0 0 4px rgba(255,215,0,0.3); }
.reward-xp { color: #88bbff; text-shadow: 0 0 4px rgba(136,187,255,0.3); }
</style>
</head>
<body onclick="window.api?.focusTerminal()">
<div class="wc3-notif">
  <div class="portrait-frame">
    <div class="portrait-glow"></div>
    <img id="portrait" src="" alt="peon">
  </div>
  <div class="msg-panel">
    <div class="msg-title" id="title"></div>
    <div class="msg-text" id="msg"></div>
    <div class="msg-rewards">
      <span class="reward-xp">+30 XP</span>
      <span class="reward-gold">+15 Or</span>
    </div>
    <div class="msg-sub">Cliquez pour voir le resultat</div>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const project = params.get('project') || 'Projet';
const faction = params.get('faction') || 'human';
const charIcon = params.get('charIcon') || '';

// Portrait image — use character icon if available, fallback to GIF
const portrait = document.getElementById('portrait');
if (charIcon) {
  portrait.src = charIcon;
  portrait.onerror = () => { portrait.src = faction === 'orc' ? 'assets/peon.gif' : 'assets/peasant.gif'; };
} else if (faction === 'orc') {
  portrait.src = 'assets/peon.gif';
  portrait.onerror = () => { portrait.src = 'assets/peasant.gif'; };
} else {
  portrait.src = 'assets/peasant.gif';
}

// Title
const titles = {
  human: ['Oui milord ?', 'A vos ordres !', 'Mission accomplie !', 'C\'est fait, sire !'],
  orc: ['Zug zug !', 'Dabu !', 'Travail termine !', 'Moe a fini, chef !']
};
const t = titles[faction] || titles.human;
document.getElementById('title').textContent = t[Math.floor(Math.random() * t.length)];

// Message
const msgs = {
  human: [
    `Travail termine sur <span class="msg-project">${project}</span>, milord !`,
    `<span class="msg-project">${project}</span> est pret, sire !`,
    `Claude a fini sur <span class="msg-project">${project}</span> !`,
  ],
  orc: [
    `Moe a fini sur <span class="msg-project">${project}</span>, chef !`,
    `<span class="msg-project">${project}</span> c'est bon, zug zug !`,
    `Claude a termine <span class="msg-project">${project}</span> !`,
  ]
};
const m = msgs[faction] || msgs.human;
document.getElementById('msg').innerHTML = m[Math.floor(Math.random() * m.length)];

// Auto-close
setTimeout(() => {
  document.body.classList.add('closing');
  setTimeout(() => window.api?.close(), 500);
}, 10000);
</script>
</body>
</html>
