<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
body { display: flex; align-items: flex-start; justify-content: flex-end; padding: 8px; cursor: pointer; }

.card {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 22px 14px 14px;
  background: rgba(8,8,16,0.92);
  border: 2px solid rgba(0,240,255,0.35);
  border-radius: 14px;
  box-shadow: 0 0 50px rgba(0,240,255,0.12), 0 0 100px rgba(139,92,246,0.06), 0 8px 40px rgba(0,0,0,0.7);
  animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  max-width: 440px;
}
.card::before {
  content: ''; position: absolute; top: -1px; left: 12%; right: 12%; height: 3px;
  background: linear-gradient(90deg, transparent, #00f0ff, #ff00ff, #00f0ff, transparent);
  border-radius: 3px; opacity: 0.9;
  animation: glowPulse 2s ease infinite;
}
@keyframes glowPulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
@keyframes cardIn {
  from { opacity: 0; transform: translateX(80px) scale(0.7) rotate(3deg); }
  60% { transform: translateX(-8px) scale(1.02) rotate(-0.5deg); }
  to { opacity: 1; transform: translateX(0) scale(1) rotate(0); }
}
.closing .card {
  animation: cardOut 0.5s ease forwards;
}
@keyframes cardOut {
  to { opacity: 0; transform: translateX(100px) scale(0.7); }
}

/* Pixel sprite */
.sprite-container {
  position: relative; flex-shrink: 0;
}
canvas {
  image-rendering: pixelated; width: 72px; height: auto;
  filter: drop-shadow(0 0 10px rgba(0,240,255,0.4));
  animation: spriteFloat 1s ease infinite;
}
@keyframes spriteFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
/* Sparkles around character */
.sparkle {
  position: absolute; width: 4px; height: 4px; border-radius: 50%;
  background: #ffd700; animation: sparkle 1.5s ease infinite;
}
.sparkle:nth-child(2) { top: 5px; right: 0; animation-delay: 0.3s; background: #00f0ff; }
.sparkle:nth-child(3) { bottom: 10px; left: 0; animation-delay: 0.6s; background: #ff00ff; }
.sparkle:nth-child(4) { top: 50%; right: -4px; animation-delay: 0.9s; background: #00ff88; }
@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0); }
  50% { opacity: 1; transform: scale(1.5); }
}

.text { display: flex; flex-direction: column; gap: 3px; }
.msg { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; color: #e0e0f0; line-height: 1.3; }
.project { color: #00f0ff; font-weight: 800; text-shadow: 0 0 8px rgba(0,240,255,0.4); }
.sub { font-family: 'Segoe UI', sans-serif; font-size: 11px; color: #00f0ff; opacity: 0.7; animation: subPulse 2s ease infinite; }
@keyframes subPulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
.rewards {
  display: flex; gap: 10px; margin-top: 4px; font-family: 'Segoe UI', sans-serif; font-size: 12px;
}
.reward { display: flex; align-items: center; gap: 3px; }
.reward.xp { color: #ffd700; }
.reward.gold { color: #ffa500; }
</style>
</head>
<body onclick="window.api?.focusNeonHub()">
<div class="card">
  <div class="sprite-container">
    <canvas id="sprite"></canvas>
    <div class="sparkle" style="top:0;left:10px"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
    <div class="sparkle"></div>
  </div>
  <div class="text">
    <div class="msg" id="msg"></div>
    <div class="sub">Cliquez pour voir le resultat</div>
    <div class="rewards">
      <span class="reward xp">+30 XP</span>
      <span class="reward gold">+15 Or</span>
    </div>
  </div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const project = decodeURIComponent(params.get('project') || 'Projet');
const faction = decodeURIComponent(params.get('faction') || 'human');

const SPRITES = {
  human: {
    palette: ['transparent','#f5c5a3','#6b4226','#2255bb','#665544','#aaaaaa','#222222','#cc8833'],
    frames: [
      ['0000002222000000','0000022222200000','0000021162100000','0000021162100000','0000011111100000','0000001111000000','0000033333300000','0000333333330000','0001333333331000','0001333333331000','0000337773300000','0000334444300000','0000044444400000','0000044004400000','0000044004400000','0000044004400000','0000066006600000'],
      ['0000002222005000','0000022222205000','0000021162105500','0000021162100000','0000011111100000','0000001111000000','0000033333300000','0000333333330000','0001333333330000','0001333333330000','0000337773300000','0000334444300000','0000044444400000','0000044004400000','0000044004400000','0000044004400000','0000066006600000'],
    ]
  },
  orc: {
    palette: ['transparent','#7ab648','#553322','#884422','#665544','#888888','#ff2222','#cc8833'],
    frames: [
      ['0000002222000000','0000022222200000','0000021162100000','0000021162100000','0000011611100000','0000001111000000','0000033333300000','0000333333330000','0001333333331000','0001333333331000','0000337773300000','0000334444300000','0000044444400000','0000044004400000','0000044004400000','0000044004400000','0000066006600000'],
      ['0000002222005000','0000022222205000','0000021162105500','0000021162100000','0000011611100000','0000001111000000','0000033333300000','0000333333330000','0001333333330000','0001333333330000','0000337773300000','0000334444300000','0000044444400000','0000044004400000','0000044004400000','0000044004400000','0000066006600000'],
    ]
  }
};

function render(frame) {
  const s = SPRITES[faction] || SPRITES.human;
  const data = s.frames[frame % s.frames.length];
  const c = document.getElementById('sprite');
  const ctx = c.getContext('2d');
  const px = 5;
  c.width = 16 * px; c.height = data.length * px;
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.imageSmoothingEnabled = false;
  for (let y = 0; y < data.length; y++)
    for (let x = 0; x < data[y].length; x++) {
      const ci = parseInt(data[y][x]);
      if (!ci) continue;
      ctx.fillStyle = s.palette[ci];
      ctx.fillRect(x*px, y*px, px, px);
    }
}

const m = {
  human: [
    `Milord ! Travail termine sur <span class="project">${project}</span> !`,
    `C'est fait, sire ! <span class="project">${project}</span> est pret !`,
    `Oui milord, <span class="project">${project}</span> est termine !`,
  ],
  orc: [
    `Chef ! Moe a fini <span class="project">${project}</span> !`,
    `Zug zug ! <span class="project">${project}</span> c'est bon !`,
    `Dabu ! <span class="project">${project}</span> termine, chef !`,
  ]
};
document.getElementById('msg').innerHTML = (m[faction]||m.human)[Math.floor(Math.random()*(m[faction]||m.human).length)];

render(0);
let f = 0;
setInterval(() => { f++; render(f); }, 400);

// Auto-close with animation
setTimeout(() => {
  document.body.classList.add('closing');
  setTimeout(() => window.api?.close(), 500);
}, 10000);
</script>
</body>
</html>
